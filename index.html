<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DAFMELIO BILLER — Billing & Inventory</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<!-- Firebase (Auth + Firestore) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --ink:#182B4A;
  --ink-soft:#334463;
  --paper:#F6F2E9;
  --paper-line:#E4DCC8;
  --amber:#D98E2B;
  --amber-deep:#B36F17;
  --teal:#2F6F62;
  --clay:#B3452C;
  --muted:#8A8172;
  --card:#FFFFFF;
  --shadow:0 1px 2px rgba(24,43,74,.06), 0 6px 20px rgba(24,43,74,.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  font-size:14px;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;letter-spacing:-0.01em;}
.mono{font-family:'JetBrains Mono',monospace;}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--paper-line);border-radius:4px;}

#app{display:flex;min-height:100vh;}

/* ---------- SIDEBAR ---------- */
#sidebar{
  width:220px;flex-shrink:0;background:var(--ink);color:#EDE7D8;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
}
.brand{
  padding:22px 20px 16px;border-bottom:1px solid rgba(237,231,216,.12);
  display:flex;align-items:center;gap:10px;
}
.brand .mark{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.brand .mark img{width:100%;height:100%;object-fit:cover;display:block;}
.brand .name{font-family:'Space Grotesk';font-weight:700;font-size:16.5px;line-height:1.15;}
.brand .name span{display:block;font-family:'Inter';font-weight:400;font-size:10.5px;color:#B9AF98;letter-spacing:.06em;text-transform:uppercase;}
nav{flex:1;overflow-y:auto;padding:14px 10px;}
.navgroup{margin-bottom:14px;}
.navgroup-label{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:#8C82A1;color:#9C9380;padding:6px 10px 4px;font-weight:600;}
.navitem{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;
  color:#D8D1BF;font-size:13.3px;font-weight:500;margin-bottom:2px;border-left:3px solid transparent;
  transition:background .12s;
}
.navitem:hover{background:rgba(255,255,255,.06);}
.navitem.active{background:rgba(217,142,43,.16);border-left:3px solid var(--amber);color:#fff;}
.navitem .ic{width:16px;text-align:center;font-size:14px;opacity:.9;}
.sidebar-foot{padding:12px 16px 16px;border-top:1px solid rgba(237,231,216,.12);font-size:11px;color:#8C8474;}

/* ---------- MAIN ---------- */
#main{flex:1;min-width:0;display:flex;flex-direction:column;}
#topbar{
  background:var(--card);border-bottom:1px solid var(--paper-line);
  padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20;
}
#globalSearch{
  flex:1;max-width:420px;background:var(--paper);border:1px solid var(--paper-line);
  border-radius:8px;padding:8px 12px;font-size:13px;display:flex;align-items:center;gap:8px;color:var(--muted);
}
#globalSearch input{border:none;background:transparent;outline:none;font-size:13px;flex:1;color:var(--ink);font-family:inherit;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:14px;}
.userchip{display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--paper-line);padding:6px 10px;border-radius:20px;font-size:12.5px;}
.userchip select{border:none;background:transparent;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink);outline:none;}
.avatar{width:22px;height:22px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;}

#view{padding:26px 30px 60px;max-width:1400px;}

/* ---------- COMMON UI ---------- */
.pagehead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.pagehead h1{font-size:22px;margin:0 0 4px;}
.pagehead p{margin:0;color:var(--muted);font-size:13px;}
.btn{
  border:none;border-radius:7px;padding:9px 15px;font-size:13px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;transition:transform .08s, box-shadow .12s;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--ink);color:#fff;}
.btn-primary:hover{background:var(--ink-soft);}
.btn-amber{background:var(--amber);color:#fff;}
.btn-amber:hover{background:var(--amber-deep);}
.btn-teal{background:var(--teal);color:#fff;}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--paper-line);}
.btn-ghost:hover{background:var(--paper);}
.btn-danger{background:#fff;color:var(--clay);border:1px solid #E9C9BC;}
.btn-danger:hover{background:#FBEEE9;}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px;}
.btn[disabled]{opacity:.4;cursor:not-allowed;}

.grid{display:grid;gap:16px;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:repeat(2,1fr);}}

.card{background:var(--card);border:1px solid var(--paper-line);border-radius:12px;box-shadow:var(--shadow);}
.card-pad{padding:18px 20px;}

.stat-card{background:var(--card);border:1px solid var(--paper-line);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;}
.stat-card .label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.stat-card .value{font-family:'Space Grotesk';font-size:25px;font-weight:700;margin-top:6px;}
.stat-card .bar{position:absolute;left:0;top:0;bottom:0;width:4px;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--paper-line);white-space:nowrap;}
td{padding:11px 12px;border-bottom:1px solid #F0EBDF;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:#FCFAF4;}
.tablewrap{background:var(--card);border:1px solid var(--paper-line);border-radius:12px;overflow:hidden;}
.tablewrap-scroll{overflow-x:auto;}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
.badge-amber{background:#FBEBD3;color:var(--amber-deep);}
.badge-teal{background:#DCEDE8;color:var(--teal);}
.badge-clay{background:#F6DED4;color:var(--clay);}
.badge-gray{background:#EEEAE0;color:var(--muted);}
.badge-navy{background:#DDE3EF;color:var(--ink);}

.searchbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.searchbar input,.searchbar select{
  border:1px solid var(--paper-line);border-radius:7px;padding:8px 11px;font-size:13px;
  background:#fff;font-family:inherit;color:var(--ink);outline:none;
}
.searchbar input{flex:1;min-width:180px;}
.searchbar input:focus,.searchbar select:focus{border-color:var(--amber);}

.empty{padding:50px 20px;text-align:center;color:var(--muted);}
.empty .big{font-size:30px;margin-bottom:8px;}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(24,25,20,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal.wide{max-width:820px;}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--paper-line);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{margin:0;font-size:16.5px;}
.modal-close{background:none;border:none;font-size:20px;color:var(--muted);line-height:1;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--paper-line);display:flex;justify-content:flex-end;gap:10px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;border:1px solid var(--paper-line);border-radius:7px;padding:9px 11px;font-size:13.5px;
  font-family:inherit;color:var(--ink);outline:none;background:#fff;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--amber);}
.field textarea{resize:vertical;min-height:64px;}
.field-row{display:flex;gap:12px;}
.field-row .field{flex:1;}
.hint{font-size:11.5px;color:var(--muted);margin-top:4px;}

.tag-row{display:flex;gap:6px;flex-wrap:wrap;}
.pillbtn{background:var(--paper);border:1px solid var(--paper-line);border-radius:20px;padding:6px 13px;font-size:12.5px;font-weight:600;}
.pillbtn.active{background:var(--ink);color:#fff;border-color:var(--ink);}

.toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:9px;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:200;display:flex;align-items:center;gap:8px;}

/* item line editor */
.items-table th,.items-table td{padding:8px 8px;}
.items-table input,.items-table select{border:1px solid var(--paper-line);border-radius:6px;padding:6px 8px;font-size:12.8px;width:100%;font-family:inherit;}
.rm-row{background:none;border:none;color:var(--clay);font-size:15px;}
.totals-box{margin-top:14px;margin-left:auto;width:280px;font-size:13px;}
.totals-box .row{display:flex;justify-content:space-between;padding:6px 0;color:var(--ink-soft);}
.totals-box .row.grand{border-top:2px solid var(--ink);margin-top:4px;padding-top:10px;font-family:'Space Grotesk';font-weight:700;font-size:17px;color:var(--ink);}

/* dashboard */
.section-title{font-family:'Space Grotesk';font-weight:700;font-size:15.5px;margin:26px 0 12px;}
.mini-list .row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #F0EBDF;font-size:13px;}
.mini-list .row:last-child{border-bottom:none;}

/* PRINT AREA */
#printRoot{display:none;}
.doc-page{
  width:210mm;min-height:297mm;margin:0 auto;background:#fff;padding:14mm 14mm;position:relative;
  font-family:'Inter',sans-serif;color:#1a1a1a;
}
.doc-page.thermal{width:80mm;min-height:auto;padding:4mm 4mm;font-size:11px;}
.doc-water{
  position:absolute;top:42%;left:50%;transform:translate(-50%,-50%) rotate(-28deg);
  font-family:'Space Grotesk';font-weight:700;font-size:80px;letter-spacing:6px;
  opacity:.09;pointer-events:none;z-index:0;
}
.doc-water.paid{color:#2F6F62;}
.doc-water.quotation{color:#B3452C;}
.thermal .doc-water{font-size:26px;letter-spacing:2px;}
.doc-hd{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2.5px solid #182B4A;padding-bottom:10px;margin-bottom:14px;position:relative;z-index:1;}
.doc-hd img{max-height:110px;max-width:300px;object-fit:contain;}
.thermal .doc-hd img{max-height:70px;max-width:180px;}
.doc-hd .cname{font-family:'Space Grotesk';font-weight:700;font-size:19px;}
.doc-hd .caddr{font-size:11px;color:#555;max-width:260px;line-height:1.5;margin-top:3px;}
.doc-title{text-align:right;}
.doc-title h2{margin:0;font-family:'Space Grotesk';font-size:20px;letter-spacing:.03em;}
.doc-title .num{font-family:'JetBrains Mono';font-size:12.5px;margin-top:4px;}
.thermal .doc-hd{flex-direction:column;text-align:center;}
.thermal .doc-title{text-align:center;margin-top:6px;}
.doc-meta{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:12px;position:relative;z-index:1;gap:10px;}
.thermal .doc-meta{flex-direction:column;gap:2px;}
.doc-meta b{color:#182B4A;}
.doc-items{width:100%;border-collapse:collapse;font-size:11.5px;position:relative;z-index:1;}
.doc-items th{background:#182B4A;color:#fff;padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;}
.doc-items td{padding:6px 8px;border-bottom:1px solid #eee;}
.thermal .doc-items{font-size:10px;}
.thermal .doc-items th{padding:4px;font-size:8.5px;}
.doc-totals{width:250px;margin-left:auto;margin-top:10px;font-size:12px;position:relative;z-index:1;}
.thermal .doc-totals{width:100%;font-size:10px;}
.doc-totals .r{display:flex;justify-content:space-between;padding:3px 0;}
.doc-totals .r.g{border-top:1.5px solid #182B4A;font-weight:700;font-size:14px;padding-top:6px;margin-top:3px;}
.doc-pay{margin-top:20px;padding-top:14px;border-top:1px dashed #ccc;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;position:relative;z-index:1;}
.doc-pay .bank-info{font-size:11px;color:#333;line-height:1.7;}
.doc-pay .bank-info b{color:#182B4A;display:block;font-size:11.5px;margin-bottom:3px;}
.doc-pay .qr-box{text-align:center;flex-shrink:0;}
.doc-pay .qr-box img{width:92px;height:92px;object-fit:contain;border:1px solid #eee;border-radius:6px;padding:4px;}
.doc-pay .qr-box .lbl{font-size:9.5px;color:#777;margin-top:4px;}
.thermal .doc-pay{flex-direction:column;align-items:center;text-align:center;}
.thermal .doc-pay .qr-box img{width:78px;height:78px;}
.doc-foot{margin-top:16px;font-size:10.5px;color:#666;border-top:1px dashed #ccc;padding-top:10px;position:relative;z-index:1;}
.stamp{display:inline-block;border:2.5px solid #2F6F62;color:#2F6F62;padding:4px 12px;border-radius:6px;font-family:'Space Grotesk';font-weight:700;transform:rotate(-6deg);font-size:13px;}
@media print{
  body *{visibility:hidden;}
  #printRoot,#printRoot *{visibility:visible;}
  #printRoot{display:block;position:absolute;left:0;top:0;}
  @page{margin:0;}
}
.loadingScreen{height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--muted);}

/* ---------- LOGIN ---------- */
#loginScreen{height:100vh;display:none;align-items:center;justify-content:center;background:var(--paper);}
.login-card{background:var(--card);border:1px solid var(--paper-line);border-radius:14px;box-shadow:var(--shadow);padding:32px 30px;width:100%;max-width:360px;}
.login-card .mark{width:64px;height:64px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.login-card .mark img{width:100%;height:100%;object-fit:cover;display:block;}
.login-card h1{font-size:19px;margin:0 0 4px;}
.login-card p{margin:0 0 20px;color:var(--muted);font-size:12.5px;}
.login-card .field{margin-bottom:12px;}
.login-card .btn{width:100%;justify-content:center;margin-top:6px;}
.login-error{background:#F6DED4;color:var(--clay);font-size:12.5px;padding:9px 12px;border-radius:7px;margin-bottom:12px;display:none;}
.login-error.show{display:block;}

/* ---------- MOBILE / SMALL SCREENS ---------- */
.menu-toggle{display:none;background:none;border:none;font-size:20px;color:var(--ink);padding:4px 8px;flex-shrink:0;line-height:1;}
.sidebar-overlay{display:none;}
.tablewrap{overflow-x:auto;}

@media(max-width:880px){
  .menu-toggle{display:inline-flex;align-items:center;justify-content:center;}
  #sidebar{
    position:fixed;top:0;left:0;width:250px;max-width:82vw;height:100vh;z-index:70;
    transform:translateX(-100%);transition:transform .22s ease;box-shadow:0 0 40px rgba(0,0,0,.35);
  }
  #sidebar.open{transform:translateX(0);}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(15,15,10,.45);z-index:65;}
  .sidebar-overlay.show{display:block;}
  #main{width:100%;min-width:0;}
  #topbar{padding:10px 14px;gap:10px;}
  #globalSearch{max-width:none;min-width:0;}
  #globalSearch input::placeholder{font-size:12px;}
  .topbar-right{gap:8px;}
  .topbar-right .btn span, #quickQuoteBtn{white-space:nowrap;}
  .userchip span{display:none;}
  .userchip{padding:6px 8px;}
  #view{padding:16px 14px 50px;}
  .pagehead{align-items:flex-start;}
  .pagehead h1{font-size:19px;}
  .pagehead p{font-size:12px;}
  .grid.g2,.grid.g3,.grid.g4{grid-template-columns:1fr;}
  .field-row{flex-direction:column;gap:0;}
  .totals-box{width:100%;}
  .modal{max-width:96vw;max-height:92vh;border-radius:12px;}
  .modal.wide{max-width:96vw;}
  .modal-head{padding:14px 16px;}
  .modal-body{padding:16px;}
  .modal-foot{padding:12px 16px;flex-wrap:wrap;}
  .overlay{padding:10px;}
  .stat-card .value{font-size:20px;}
  .doc-pay{flex-direction:column;align-items:center;text-align:center;}
}

@media(max-width:460px){
  #quickQuoteBtn{padding:8px 10px;font-size:12px;}
  .login-card{padding:26px 20px;}
}
</style>
</head>
<body>

<script>
/* =========================================================

const firebaseConfig = {
  apiKey: "AIzaSyB-ztrOJRisxGr1PHKZ1gU3WBquncz_2xI",
  authDomain: "dafmelio-billing.firebaseapp.com",
  projectId: "dafmelio-billing",
  storageBucket: "dafmelio-billing.firebasestorage.app",
  messagingSenderId: "4627672699",
  appId: "1:4627672699:web:86fd3c945482101997fcde",
  measurementId: "G-T5ZPY30SWP"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const fdb = firebase.firestore();

// Firebase Authentication only supports email/password sign-in.
// To let staff log in with a plain User ID (no email needed), we silently
// map every User ID to a fixed internal email address like "karthik@dafmelio.local".
// Create the SAME address (with this exact suffix) in Firebase Console → Authentication.
const LOGIN_ID_DOMAIN = 'dafmelio.local';
function normalizeUserId(v){ return (v||'').trim().toLowerCase().replace(/[^a-z0-9._-]/g,''); }
function loginEmailForUserId(userId){ return normalizeUserId(userId) + '@' + LOGIN_ID_DOMAIN; }
function userIdFromLoginEmail(email){ return (email||'').split('@')[0]; }

const COLLECTIONS = ['customers','categories','suppliers','products','stockLogs',
  'quotations','invoices','payments','leads','licenses','amc','documents','activityLog','users'];
const SETTINGS_DOC = fdb.collection('meta').doc('settings');

let DATA = {};
let STATE = { tab:'dashboard', modal:null, search:'', currentUser:'', currentRole:'Read Only', authEmail:'', mobileNavOpen:false };

const uid = () => 'id' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
const todayStr = () => new Date().toISOString().slice(0,10);
const fmtMoney = n => '₹' + (Number(n)||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const daysUntil = d => Math.ceil((new Date(d) - new Date(todayStr())) / 86400000);

function defaultSettings(){
  return {
    companyName:'Dafmelio Systems', companyAddress:'12, Anna Salai, Chennai, Tamil Nadu - 600002',
    companyPhone:'+91 98765 43210', companyGST:'33AAAAA0000A1Z5', logoDataUrl:'',
    bankName:'', bankAccountName:'', bankAccountNo:'', bankIFSC:'', bankBranch:'', upiId:'', bankQrDataUrl:'',
    counters:{quotation:100, invoice:100, enquiry:100, receipt:100, po:100, dc:100, cn:100},
    gstDefault:18
  };
}
function defaultUsers(){
  return [];
}

async function loadAll(){
  // settings is a single document, not an array of records
  try{
    const settingsSnap = await SETTINGS_DOC.get();
    DATA.settings = settingsSnap.exists ? settingsSnap.data() : defaultSettings();
    if(!settingsSnap.exists) await SETTINGS_DOC.set(DATA.settings);
  }catch(e){
    DATA.settings = defaultSettings();
  }

  for(const key of COLLECTIONS){
    try{
      const snap = await fdb.collection(key).get();
      DATA[key] = snap.docs.map(d => d.data());
    }catch(e){
      console.error('Failed to load', key, e);
      DATA[key] = (key==='users') ? defaultUsers() : [];
    }
  }
}

// Whole-array sync: overwrites the Firestore collection to match DATA[key].
// Simple and safe for a small team's data volumes; note that two people
// editing the exact same collection at the exact same instant can race —
// acceptable trade-off for a small-team tool with no dedicated backend.
async function save(key){
  try{
    if(key === 'settings'){
      await SETTINGS_DOC.set(DATA.settings);
      return;
    }
    const colRef = fdb.collection(key);
    const existingSnap = await colRef.get();
    const existingIds = new Set(existingSnap.docs.map(d => d.id));
    const currentIds = new Set((DATA[key]||[]).map(item => item.id));

    const batch = fdb.batch();
    (DATA[key]||[]).forEach(item => batch.set(colRef.doc(item.id), item));
    existingIds.forEach(id => { if(!currentIds.has(id)) batch.delete(colRef.doc(id)); });
    await batch.commit();
  }catch(e){
    console.error('Save failed for', key, e);
    toast('⚠ Could not save '+key);
  }
}
function log(action){
  DATA.activityLog.unshift({id:uid(), user:STATE.currentUser, action, date:new Date().toISOString()});
  DATA.activityLog = DATA.activityLog.slice(0,300);
  save('activityLog');
}
function toast(msg){
  const t = document.createElement('div'); t.className='toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2600);
}
function nextNumber(type, prefix){
  const n = DATA.settings.counters[type] || 100;
  DATA.settings.counters[type] = n+1;
  save('settings');
  const y = new Date().getFullYear().toString().slice(2);
  return `${prefix}-${y}-${String(n).padStart(4,'0')}`;
}

/* ---------------- calc helpers ---------------- */
function lineTotal(item){ return (item.qty||0) * (item.rate||0); }
function docTotals(items, discount){
  const sub = items.reduce((s,i)=>s+lineTotal(i),0);
  const disc = Number(discount)||0;
  const afterDisc = sub - disc;
  const gst = items.reduce((s,i)=> s + (lineTotal(i) - (lineTotal(i)/sub||0)*disc) * ((i.gst||0)/100), 0) || 0;
  const grand = afterDisc + gst;
  return {sub, disc, gst, grand};
}

function crudCellValue(key,cfg,r,col){
  if(col==='catName') return catName(r.categoryId);

  if(col==='status') return `<span class="badge ${statusBadgeClass(r.status)}">${esc(r.status||'—')}</span>`;
  if(col==='activationStatus') return `<span class="badge ${r.activationStatus==='Activated'?'badge-teal':'badge-gray'}">${esc(r.activationStatus||'—')}</span>`;
  if(col==='stock'){
    const low = r.lowStockThreshold && Number(r.stock) <= Number(r.lowStockThreshold);
    return `<span class="${low?'badge badge-clay':''}">${r.stock ?? 0}${low?' LOW':''}</span>`;
  }
  if(col==='salePrice'||col==='purchasePrice') return fmtMoney(r[col]);
  if(col==='gstCol') return r.gstApplicable===false ? `<span class="badge badge-gray">No GST</span>` : `<span class="badge badge-teal">${Number(r.gstRate)||0}%</span>`;
  if(col==='warrantyEnd'||col==='amcEnd'||col==='followUpDate') return r[col]?fmtDate(r[col]):'—';
  return esc(r[col] ?? '—');
}

const PRODUCT_CSV_HEADERS = ['Name','SKU','Category','Supplier','Purchase Price','Sale Price','GST Applicable','GST Rate','Opening Stock','Low Stock Alert','Warranty Months'];

function csvField(v){
  v = (v==null?'':String(v));
  if(/[",\n]/.test(v)) return '"' + v.replace(/"/g,'""') + '"';
  return v;
}
function productsToCSVText(){
  const rows = DATA.products.map(p => [
    p.name||'', p.sku||'', catName(p.categoryId)!=='—'?catName(p.categoryId):'', supName(p.supplierId)!=='—'?supName(p.supplierId):'',
    p.purchasePrice||0, p.salePrice||0, (p.gstApplicable===false?'No':'Yes'), p.gstRate||0, p.stock||0, p.lowStockThreshold||0, p.warrantyMonths||0
  ]);
  return [PRODUCT_CSV_HEADERS, ...rows].map(r => r.map(csvField).join(',')).join('\r\n');
}
function downloadTextFile(filename, text){
  const blob = new Blob([text], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  a.remove(); URL.revokeObjectURL(url);
}
function exportProductsCSV(){
  downloadTextFile(`products-${todayStr()}.csv`, productsToCSVText());
  toast('✓ Exported '+DATA.products.length+' products');
}
// Minimal CSV parser: supports quoted fields with commas/newlines/escaped quotes.
function parseCSVText(text){
  const rows = []; let row = []; let field = ''; let inQuotes = false;
  text = text.replace(/^\uFEFF/, ''); // strip BOM
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; } else { inQuotes = false; }
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c === '\r'){ /* skip, \n handles the break */ }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.some(f => f.trim() !== ''));
}
function findOrCreateByName(list, key, name){
  if(!name || !name.trim()) return '';
  const found = list.find(x => (x.name||'').toLowerCase().trim() === name.toLowerCase().trim());
  if(found) return found.id;
  const rec = {id:uid(), name:name.trim()};
  list.push(rec);
  return rec.id;
}
async function importProductsCSV(text){
  const rows = parseCSVText(text);
  if(!rows.length){ toast('⚠ Empty CSV file'); return; }
  // detect + skip header row
  const first = rows[0].map(f=>f.toLowerCase().trim());
  const startIdx = first[0]==='name' ? 1 : 0;
  let created = 0, updated = 0;
  let categoriesTouched = false, suppliersTouched = false;
  for(let i=startIdx;i<rows.length;i++){
    const r = rows[i];
    const [name, sku, categoryName, supplierName, purchasePrice, salePrice, gstApplicableStr, gstRate, stock, lowStockThreshold, warrantyMonths] = r;
    if(!name || !name.trim()) continue;
    let categoryId = '';
    if(categoryName && categoryName.trim()){ categoryId = findOrCreateByName(DATA.categories,'categories',categoryName); categoriesTouched = true; }
    let supplierId = '';
    if(supplierName && supplierName.trim()){ supplierId = findOrCreateByName(DATA.suppliers,'suppliers',supplierName); suppliersTouched = true; }
    const gstApplicable = !(gstApplicableStr && /^(no|false|0)$/i.test(gstApplicableStr.trim()));
    let existing = null;
    if(sku && sku.trim()) existing = DATA.products.find(p => p.sku && p.sku.toLowerCase().trim()===sku.toLowerCase().trim());
    if(!existing) existing = DATA.products.find(p => p.name.toLowerCase().trim()===name.toLowerCase().trim());
    const rec = existing || {id:uid(), createdAt:new Date().toISOString()};
    rec.name = name.trim();
    rec.sku = (sku||'').trim();
    if(categoryId) rec.categoryId = categoryId;
    if(supplierId) rec.supplierId = supplierId;
    rec.purchasePrice = Number(purchasePrice)||0;
    rec.salePrice = Number(salePrice)||0;
    rec.gstApplicable = gstApplicable;
    rec.gstRate = Number(gstRate)||0;
    rec.stock = Number(stock)||0;
    rec.lowStockThreshold = Number(lowStockThreshold)||0;
    rec.warrantyMonths = Number(warrantyMonths)||0;
    if(existing) updated++; else { DATA.products.push(rec); created++; }
  }
  await save('products');
  if(categoriesTouched) await save('categories');
  if(suppliersTouched) await save('suppliers');
  log(`Bulk imported products: ${created} created, ${updated} updated`);
  toast(`✓ Import done — ${created} added, ${updated} updated`);
  render();
}

/* =========================================================
   FULL APP BACKUP / RESTORE (JSON) — safety net against data loss
   ========================================================= */
function downloadJSONFile(filename, obj){
  const blob = new Blob([JSON.stringify(obj, null, 2)], {type:'application/json;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  a.remove(); URL.revokeObjectURL(url);
}
function downloadBackup(){
  const backup = {
    _meta: {app:'DAFMELIO BILLER', exportedAt: new Date().toISOString(), version:1},
    settings: DATA.settings,
  };
  COLLECTIONS.forEach(key => backup[key] = DATA[key] || []);
  downloadJSONFile(`dafmelio-backup-${todayStr()}.json`, backup);
  toast('✓ Backup downloaded');
}
async function restoreBackup(text){
  let backup;
  try{ backup = JSON.parse(text); }catch(e){ toast('⚠ Invalid backup file'); return; }
  if(!backup || typeof backup !== 'object' || (!backup.settings && !backup.customers && !backup.products)){
    toast('⚠ This does not look like a Dafmelio Biller backup file'); return;
  }
  const when = backup._meta && backup._meta.exportedAt ? new Date(backup._meta.exportedAt).toLocaleString('en-IN') : 'unknown date';
  if(!confirm(`Restore backup from ${when}?\n\nThis will REPLACE all current data in Firebase (products, invoices, customers, everything) with what's in this file. This cannot be undone.\n\nType OK only if you're sure.`)) return;

  toast('Restoring… please wait, do not close this tab');
  if(backup.settings){ DATA.settings = backup.settings; await save('settings'); }
  for(const key of COLLECTIONS){
    if(Array.isArray(backup[key])){
      DATA[key] = backup[key];
      await save(key);
    }
  }
  log('Restored data from backup file ('+when+')');
  toast('✓ Restore complete');
  render();
}

function fieldHtml(f, val){
  if(f.type==='checkbox'){
    const checked = val===false ? false : (val===undefined ? true : !!val); // default ON when field never set
    return `<div class="field"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
      <input data-field="${f.key}" type="checkbox" style="width:16px;height:16px;" ${checked?'checked':''}>
      ${f.label}</label></div>`;
  }
  val = val ?? '';
  if(f.type==='textarea') return `<div class="field"><label>${f.label}${f.required?' *':''}</label><textarea data-field="${f.key}">${esc(val)}</textarea></div>`;
  if(f.type==='select') return `<div class="field"><label>${f.label}${f.required?' *':''}</label><select data-field="${f.key}">${optionsForField(f,val)}</select></div>`;
  return `<div class="field"><label>${f.label}${f.required?' *':''}</label><input data-field="${f.key}" type="${f.type}" value="${esc(val)}"></div>`;
}

function saveCrud(key,id){
  const cfg = CRUD[key];
  const modal = document.querySelector('.modal');
  const rec = {};
  cfg.fields.forEach(f=>{
    const el = modal.querySelector(`[data-field="${f.key}"]`);
    if(!el) return;
    if(f.type==='checkbox'){ rec[f.key] = el.checked; return; }
    rec[f.key] = f.type==='number' ? (el.value===''?'':Number(el.value)) : el.value;
  });
  // required check
  for(const f of cfg.fields){ if(f.required && !rec[f.key] && f.key!=='note'){ toast('⚠ '+f.label+' is required'); return; } }

  if(id==='new'){
    rec.id = uid();
    rec.createdAt = new Date().toISOString();
    if(key==='leads'){ rec.enquiryNo = nextNumber('enquiry','ENQ'); rec.status = rec.status || 'New'; rec.notes = rec.note?[{text:rec.note,date:new Date().toISOString()}]:[]; delete rec.note; }
    if(key==='licenses'){ autoCalcWarranty(rec); }
    DATA[key].push(rec);
    log(`Created ${cfg.title.replace(/s$/,'')}: ${rec.name||rec.customerName||rec.licenseKey||rec.id}`);
  } else {
    const existing = DATA[key].find(r=>r.id===id);
    if(key==='leads' && rec.note){ existing.notes = existing.notes||[]; existing.notes.push({text:rec.note, date:new Date().toISOString()}); delete rec.note; }
    Object.assign(existing, rec);
    if(key==='licenses') autoCalcWarranty(existing);
    log(`Updated ${cfg.title.replace(/s$/,'')}: ${existing.name||existing.customerName||existing.licenseKey||id}`);
  }
  save(key);
  STATE.modal = null;
  render();
  toast('✓ Saved');
}
function autoCalcWarranty(rec){
  if(rec.warrantyStart && !rec.warrantyEnd){
    const prod = prodById(rec.productId);
    const months = prod?.warrantyMonths;
    if(months){
      const d = new Date(rec.warrantyStart); d.setMonth(d.getMonth()+Number(months));
      rec.warrantyEnd = d.toISOString().slice(0,10);
    }
  }
}
function deleteRecord(key,id){
  if(!confirm('Delete this record? This cannot be undone.')) return;
  DATA[key] = DATA[key].filter(r=>r.id!==id);
  save(key);
  log(`Deleted a record from ${key}`);
  render();
}

function saveDoc(key,id){
  const cfg = DOC_CFG[key];
  const modal = document.querySelector('.modal');
  const items = readItemsFromDom().filter(i=>i.qty>0 && (i.rate>=0));
  if(!items.length){ toast('⚠ Add at least one line item'); return; }
  const customerId = modal.querySelector('[data-field="customerId"]').value;
  if(!customerId){ toast('⚠ Select a customer'); return; }
  const rec = {
    customerId, date: modal.querySelector('[data-field="date"]').value || todayStr(),
    items, discount: Number(modal.querySelector('[data-field="discount"]').value)||0,
    notes: modal.querySelector('[data-field="notes"]').value,
  };
  if(key==='quotations') rec.status = modal.querySelector('[data-field="status"]').value;
  if(key==='invoices'){
    rec.paymentStatus = modal.querySelector('[data-field="paymentStatus"]').value;
    rec.dueDate = modal.querySelector('[data-field="dueDate"]')?.value || '';
    rec.paidAmount = Number(modal.querySelector('[data-field="paidAmount"]')?.value)||0;
  }
  if(id==='new'){
    rec.id = uid();
    rec.number = nextNumber(cfg.prefix==='QTN'?'quotation':'invoice', cfg.prefix);
    DATA[key].push(rec);
    log(`Created ${cfg.label} ${rec.number}`);
  } else {
    const existing = DATA[key].find(r=>r.id===id);
    const wasPaid = existing.paymentStatus==='Paid';
    Object.assign(existing, rec);
    if(key==='invoices' && !wasPaid && existing.paymentStatus==='Paid'){
      autoCreateReceipt(existing);
    }
  }
  save(key);
  STATE.modal=null; render(); toast('✓ '+cfg.label+' saved');
}
function autoCreateReceipt(invoice){
  const t = docTotals(invoice.items, invoice.discount);
  DATA.documents.push({
    id:uid(), type:'Receipt', number: nextNumber('receipt','RCPT'), date: todayStr(),
    partyType:'customer', partyId: invoice.customerId, refNumber: invoice.number,
    items:[], amount: t.grand, notes:`Auto-generated on payment for ${invoice.number}`
  });
  save('documents');
  log(`Auto-created Receipt for ${invoice.number}`);
  toast('✓ Invoice paid → Receipt auto-created');
}
function convertQuoteToInvoice(qId){
  const q = DATA.quotations.find(x=>x.id===qId);
  if(!q) return;
  const inv = { id:uid(), number: nextNumber('invoice','INV'), quotationId:q.id, customerId:q.customerId,
    date: todayStr(), items:q.items, discount:q.discount, notes:q.notes, paymentStatus:'Pending', paidAmount:0, dueDate:'' };
  DATA.invoices.push(inv);
  q.status = 'Converted';
  save('invoices'); save('quotations');
  log(`Auto-created Invoice ${inv.number} from Quotation ${q.number}`);
  render(); toast('✓ Converted to Invoice '+inv.number);
}
function convertLeadToCustomer(leadId){
  const lead = DATA.leads.find(x=>x.id===leadId);
  if(!lead || lead.convertedToCustomerId) return;
  // avoid duplicate customer if this mobile number already exists
  let cust = DATA.customers.find(c => c.mobile && lead.mobile && c.mobile.trim()===lead.mobile.trim());
  if(!cust){
    cust = {id:uid(), name:lead.customerName||'', mobile:lead.mobile||'', email:'', gst:'', address:''};
    DATA.customers.push(cust);
  }
  lead.convertedToCustomerId = cust.id;
  lead.status = 'Won';
  save('customers'); save('leads');
  log(`Converted lead ${lead.enquiryNo||''} (${lead.customerName}) to Customer`);
  render(); toast('✓ Added as Customer — you can edit their details anytime in Customers');
}
function markInvoicePaid(invId){
  const inv = DATA.invoices.find(x=>x.id===invId);
  if(!inv) return;
  inv.paymentStatus = 'Paid';
  const t = docTotals(inv.items, inv.discount);
  inv.paidAmount = t.grand;
  save('invoices');
  autoCreateReceipt(inv);
  render();
}

  const status = key==='invoices' ? rec.paymentStatus : rec.status;
  const water = status==='Paid' ? {cls:'paid', text:'PAID'} : (key==='quotations' ? {cls:'quotation', text:'QUOTATION'} : null);
  const s = DATA.settings;
  const html = `
  <div class="doc-page ${format==='thermal'?'thermal':''}">
    ${water?`<div class="doc-water ${water.cls}">${water.text}</div>`:''}
    <div class="doc-hd">
      <div>

    </div>
    <div class="doc-meta">
      <div><b>Bill To:</b><br>${esc(cust.name||'—')}<br>${esc(cust.mobile||'')}<br>${esc(cust.address||'')}</div>
      <div style="text-align:right"><b>Date:</b> ${fmtDate(rec.date)}<br>${rec.dueDate?`<b>Due:</b> ${fmtDate(rec.dueDate)}<br>`:''}${cust.gst?`<b>GSTIN:</b> ${esc(cust.gst)}`:''}</div>
    </div>
    <table class="doc-items"><thead><tr><th>Item</th><th>Qty</th><th>Rate</th><th>GST%</th><th>Amount</th></tr></thead>
      <tbody>${rec.items.map(i=>`<tr><td>${esc(i.name)}</td><td>${i.qty}</td><td>${fmtMoney(i.rate)}</td><td>${i.gst}%</td><td>${fmtMoney(lineTotal(i))}</td></tr>`).join('')}</tbody></table>
    <div class="doc-totals">
      <div class="r"><span>Subtotal</span><span>${fmtMoney(t.sub)}</span></div>
      <div class="r"><span>Discount</span><span>− ${fmtMoney(t.disc)}</span></div>
      <div class="r"><span>GST</span><span>${fmtMoney(t.gst)}</span></div>
      <div class="r g"><span>Total</span><span>${fmtMoney(t.grand)}</span></div>
      ${key==='invoices'&&rec.paidAmount?`<div class="r"><span>Paid</span><span>${fmtMoney(rec.paidAmount)}</span></div><div class="r"><span>Balance</span><span>${fmtMoney(t.grand-rec.paidAmount)}</span></div>`:''}
    </div>
    ${status==='Paid'?`<div style="margin-top:16px;"><span class="stamp">✓ PAID</span></div>`:''}
    ${bankBlock(s, status)}
    <div class="doc-foot">${esc(rec.notes||'Thank you for your business.')}<br>This is a system-generated ${cfg.label.toLowerCase()}.</div>
  </div>`;
  document.getElementById('printRoot').innerHTML = html;
  setTimeout(()=>window.print(), 80);
}
// Bank/UPI payment details block shown on printed invoices & quotations.
// Skipped once an invoice is fully Paid (nothing left to collect).
function bankBlock(s, status){
  if(status==='Paid') return '';
  const hasBank = s.bankName || s.bankAccountNo || s.upiId;
  if(!hasBank) return '';
  const lines = [];
  if(s.bankAccountName) lines.push(`A/c Name: ${esc(s.bankAccountName)}`);
  if(s.bankName) lines.push(`Bank: ${esc(s.bankName)}`);
  if(s.bankAccountNo) lines.push(`A/c No: ${esc(s.bankAccountNo)}`);
  if(s.bankIFSC) lines.push(`IFSC: ${esc(s.bankIFSC)}`);
  if(s.bankBranch) lines.push(`Branch: ${esc(s.bankBranch)}`);
  if(s.upiId) lines.push(`UPI ID: ${esc(s.upiId)}`);
  return `<div class="doc-pay">
    <div class="bank-info"><b>Payment Details</b>${lines.join('<br>')}</div>
    ${s.bankQrDataUrl?`<div class="qr-box"><img src="${s.bankQrDataUrl}"><div class="lbl">Scan to pay via UPI</div></div>`:''}
  </div>`;
}
function waLink(key,id){
  const rec = DATA[key].find(r=>r.id===id);
  const cust = custById(rec.customerId);
  if(!cust || !cust.mobile) { toast('⚠ Customer has no mobile number'); return; }
  const cfg = DOC_CFG[key];
  const t = docTotals(rec.items, rec.discount);
  const msg = `Hello ${cust.name}, your ${cfg.label} ${rec.number} dated ${fmtDate(rec.date)} for ${fmtMoney(t.grand)} from ${DATA.settings.companyName}. ${key==='invoices' && rec.paymentStatus==='Paid' ? 'Payment received — thank you!' : key==='invoices' ? 'Please make payment at your earliest convenience.' : 'Please review and confirm to proceed.'}`;
  const phone = cust.mobile.replace(/[^0-9]/g,'');
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

function saveGenericDoc(){
  const modal = document.querySelector('.modal');
  const type = modal.querySelector('[data-field="type"]').value;
  const partySelect = modal.querySelector('[data-field="partyId"]');
  const partyId = partySelect.value;
  const partyType = partySelect.selectedOptions[0]?.dataset.type || 'customer';
  const prefixMap = {'Receipt':'RCPT','Proforma Invoice':'PI','Delivery Challan':'DC','Purchase Order':'PO','Credit Note':'CN'};
  const counterMap = {'Receipt':'receipt','Proforma Invoice':'quotation','Delivery Challan':'dc','Purchase Order':'po','Credit Note':'cn'};
  const rec = {
    id:uid(), type, number: nextNumber(counterMap[type]||'receipt', prefixMap[type]||'DOC'),
    date: modal.querySelector('[data-field="date"]').value, partyType, partyId,
    amount: Number(modal.querySelector('[data-field="amount"]').value)||0,
    notes: modal.querySelector('[data-field="notes"]').value, items:[]
  };
  DATA.documents.push(rec); save('documents');
  log(`Created ${type} ${rec.number}`);
  STATE.modal=null; render(); toast('✓ Document created');
}

/* =========================================================
   REMINDERS
   ========================================================= */
function remindersHtml(){
  const items = [];
  DATA.licenses.forEach(l=>{
    if(l.warrantyEnd) items.push({type:'Warranty Expiry', party:custName(l.customerId), date:l.warrantyEnd, ref:l.licenseKey||'—', mobile:custById(l.customerId)?.mobile});
    if(l.amcEnd) items.push({type:'AMC Renewal', party:custName(l.customerId), date:l.amcEnd, ref:l.licenseKey||'—', mobile:custById(l.customerId)?.mobile});
  });
  DATA.invoices.filter(i=>i.paymentStatus!=='Paid' && i.dueDate).forEach(i=>{
    items.push({type:'Due Payment', party:custName(i.customerId), date:i.dueDate, ref:i.number, mobile:custById(i.customerId)?.mobile, invId:i.id});
  });
  DATA.leads.filter(l=>l.followUpDate && l.status!=='Won' && l.status!=='Lost').forEach(l=>{
    items.push({type:'Lead Follow-up', party:l.customerName, date:l.followUpDate, ref:l.enquiryNo, mobile:l.mobile});
  });
  items.sort((a,b)=> new Date(a.date)-new Date(b.date));
  return `<div class="pagehead"><div><h1>⏰ Reminders</h1><p>Warranty, license, AMC and payment renewals — always sorted by soonest.</p></div></div>
  <div class="tablewrap tablewrap-scroll">
  ${items.length? `<table><thead><tr><th>Type</th><th>Party</th><th>Reference</th><th>Date</th><th>Status</th><th></th></tr></thead>
  <tbody>${items.map(it=>{
    const d = daysUntil(it.date);
    const overdue = d<0, soon = d>=0 && d<=7;
    return `<tr><td>${it.type}</td><td>${esc(it.party)}</td><td class="mono">${esc(it.ref)}</td><td>${fmtDate(it.date)}</td>
    <td><span class="badge ${overdue?'badge-clay':soon?'badge-amber':'badge-gray'}">${overdue?Math.abs(d)+'d overdue':d+'d left'}</span></td>
    <td style="text-align:right;">${it.mobile?`<button class="btn btn-ghost btn-sm" data-remind-wa="${esc(it.mobile)}|${esc(it.type)}|${esc(it.party)}|${esc(it.ref)}">Send WhatsApp</button>`:''}</td></tr>`;
  }).join('')}</tbody></table>`
  : `<div class="empty"><div class="big">🔔</div>No upcoming renewals or dues. All clear!</div>`}
  </div>`;
}

/* =========================================================
   REPORTS
   ========================================================= */
function reportsHtml(){
  const invs = DATA.invoices;
  const byDate = {}, byMonth = {}, byProduct = {}, byCustomer = {};
  let gstTotal = 0, profitTotal = 0, revenueTotal = 0;
  invs.forEach(inv=>{
    const t = docTotals(inv.items, inv.discount);
    revenueTotal += t.grand; gstTotal += t.gst;
    byDate[inv.date] = (byDate[inv.date]||0) + t.grand;
    const m = inv.date.slice(0,7);
    byMonth[m] = (byMonth[m]||0) + t.grand;
    byCustomer[inv.customerId] = (byCustomer[inv.customerId]||0) + t.grand;
    inv.items.forEach(it=>{
      byProduct[it.name] = byProduct[it.name] || {qty:0, revenue:0};
      byProduct[it.name].qty += Number(it.qty);
      byProduct[it.name].revenue += lineTotal(it);
      const prod = prodById(it.productId);
      if(prod) profitTotal += (it.rate - (prod.purchasePrice||0)) * it.qty;
    });
  });
  const topProducts = Object.entries(byProduct).sort((a,b)=>b[1].revenue-a[1].revenue).slice(0,8);
  const topCustomers = Object.entries(byCustomer).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const monthRows = Object.entries(byMonth).sort().reverse().slice(0,12);
  const dateRows = Object.entries(byDate).sort().reverse().slice(0,10);

  return `<div class="pagehead"><div><h1>▲ Reports</h1><p>Sales, product, customer, GST & profit — computed live from your invoices.</p></div></div>
  <div class="grid g4">
    <div class="stat-card"><div class="bar" style="background:var(--teal)"></div><div class="label">Total Revenue</div><div class="value">${fmtMoney(revenueTotal)}</div></div>
    <div class="stat-card"><div class="bar" style="background:var(--amber)"></div><div class="label">GST Collected</div><div class="value">${fmtMoney(gstTotal)}</div></div>
    <div class="stat-card"><div class="bar" style="background:var(--ink)"></div><div class="label">Est. Profit</div><div class="value">${fmtMoney(profitTotal)}</div></div>
    <div class="stat-card"><div class="bar" style="background:var(--clay)"></div><div class="label">Invoices Raised</div><div class="value">${invs.length}</div></div>
  </div>
  <div class="grid g2" style="margin-top:20px;">
    <div>
      <div class="section-title">Monthly Sales</div>
      <div class="tablewrap"><table><thead><tr><th>Month</th><th>Revenue</th></tr></thead><tbody>
      ${monthRows.length?monthRows.map(([m,v])=>`<tr><td>${m}</td><td class="mono">${fmtMoney(v)}</td></tr>`).join(''):'<tr><td colspan="2" style="color:var(--muted)">No data yet</td></tr>'}
      </tbody></table></div>
    </div>
    <div>
      <div class="section-title">Daily Sales (recent)</div>
      <div class="tablewrap"><table><thead><tr><th>Date</th><th>Revenue</th></tr></thead><tbody>
      ${dateRows.length?dateRows.map(([d,v])=>`<tr><td>${fmtDate(d)}</td><td class="mono">${fmtMoney(v)}</td></tr>`).join(''):'<tr><td colspan="2" style="color:var(--muted)">No data yet</td></tr>'}
      </tbody></table></div>
    </div>
  </div>
  <div class="grid g2" style="margin-top:20px;">
    <div>
      <div class="section-title">Product-wise Report</div>
      <div class="tablewrap"><table><thead><tr><th>Product</th><th>Qty Sold</th><th>Revenue</th></tr></thead><tbody>
      ${topProducts.length?topProducts.map(([n,v])=>`<tr><td>${esc(n)}</td><td>${v.qty}</td><td class="mono">${fmtMoney(v.revenue)}</td></tr>`).join(''):'<tr><td colspan="3" style="color:var(--muted)">No data yet</td></tr>'}
      </tbody></table></div>
    </div>
    <div>
      <div class="section-title">Customer-wise Report</div>
      <div class="tablewrap"><table><thead><tr><th>Customer</th><th>Revenue</th></tr></thead><tbody>
      ${topCustomers.length?topCustomers.map(([id,v])=>`<tr><td>${esc(custName(id))}</td><td class="mono">${fmtMoney(v)}</td></tr>`).join(''):'<tr><td colspan="2" style="color:var(--muted)">No data yet</td></tr>'}
      </tbody></table></div>
    </div>
  </div>`;
}

    <p class="hint" style="margin-top:10px;">⚠ Restoring replaces <b>all</b> current data in Firebase with the data inside the backup file. Only do this if today's data is corrupted/lost and you want to roll back.</p>
  </div>`;
}

/* =========================================================
   DASHBOARD
   ========================================================= */
function dashboardHtml(){
  const today = todayStr();
  const todaysRevenue = DATA.invoices.filter(i=>i.date===today).reduce((s,i)=>s+docTotals(i.items,i.discount).grand,0);
  const pending = DATA.invoices.filter(i=>i.paymentStatus!=='Paid').reduce((s,i)=>{const t=docTotals(i.items,i.discount);return s+(t.grand-(i.paidAmount||0));},0);
  const totalQuotes = DATA.quotations.length, totalInvoices = DATA.invoices.length;
  const custRevenue = {};
  DATA.invoices.forEach(i=>{const t=docTotals(i.items,i.discount); custRevenue[i.customerId]=(custRevenue[i.customerId]||0)+t.grand;});
  const topCustomers = Object.entries(custRevenue).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const upcoming = [];
  DATA.licenses.forEach(l=>{ if(l.warrantyEnd) upcoming.push({label:'Warranty · '+custName(l.customerId), date:l.warrantyEnd}); if(l.amcEnd) upcoming.push({label:'AMC · '+custName(l.customerId), date:l.amcEnd}); });
  upcoming.sort((a,b)=>new Date(a.date)-new Date(b.date));
  const lowStock = DATA.products.filter(p=>p.lowStockThreshold && Number(p.stock)<=Number(p.lowStockThreshold));

  return `
  <div class="pagehead"><div><h1>Good day, ${esc(STATE.currentUser)} 👋</h1><p>Here's what's happening in your business today.</p></div></div>
  <div class="grid g4">
    <div class="stat-card"><div class="bar" style="background:var(--teal)"></div><div class="label">Today's Revenue</div><div class="value">${fmtMoney(todaysRevenue)}</div></div>
    <div class="stat-card"><div class="bar" style="background:var(--clay)"></div><div class="label">Pending Collections</div><div class="value">${fmtMoney(pending)}</div></div>
    <div class="stat-card"><div class="bar" style="background:var(--amber)"></div><div class="label">Total Quotations</div><div class="value">${totalQuotes}</div></div>
    <div class="stat-card"><div class="bar" style="background:var(--ink)"></div><div class="label">Total Invoices</div><div class="value">${totalInvoices}</div></div>
  </div>
  <div class="grid g3" style="margin-top:22px;">
    <div class="card card-pad">
      <div class="section-title" style="margin-top:0;">Top Customers</div>
      <div class="mini-list">${topCustomers.length?topCustomers.map(([id,v])=>`<div class="row"><span>${esc(custName(id))}</span><span class="mono">${fmtMoney(v)}</span></div>`).join(''):'<div class="row" style="color:var(--muted)">No sales yet</div>'}</div>
    </div>
    <div class="card card-pad">
      <div class="section-title" style="margin-top:0;">Upcoming Renewals</div>
      <div class="mini-list">${upcoming.length?upcoming.slice(0,5).map(u=>`<div class="row"><span>${esc(u.label)}</span><span class="mono">${fmtDate(u.date)}</span></div>`).join(''):'<div class="row" style="color:var(--muted)">Nothing upcoming</div>'}</div>
    </div>
    <div class="card card-pad">
      <div class="section-title" style="margin-top:0;">Low Stock Alerts</div>
      <div class="mini-list">${lowStock.length?lowStock.slice(0,5).map(p=>`<div class="row"><span>${esc(p.name)}</span><span class="badge badge-clay">${p.stock} left</span></div>`).join(''):'<div class="row" style="color:var(--muted)">Stock levels healthy</div>'}</div>
    </div>
  </div>
  <div class="section-title">Quick Actions</div>
  <div class="tag-row">
    <button class="btn btn-primary btn-sm" data-open-modal="quotations:new">+ Quotation</button>
    <button class="btn btn-primary btn-sm" data-open-modal="invoices:new">+ Invoice</button>
    <button class="btn btn-ghost btn-sm" data-open-modal="customers:new">+ Customer</button>
    <button class="btn btn-ghost btn-sm" data-open-modal="products:new">+ Product</button>
    <button class="btn btn-ghost btn-sm" data-open-modal="leads:new">+ Lead</button>
  </div>`;
}

/* =========================================================
   GLOBAL SEARCH
   ========================================================= */
function globalSearchResults(q){
  const custs = DATA.customers.filter(c=>[c.name,c.mobile,c.email].join(' ').toLowerCase().includes(q));
  const invs = DATA.invoices.filter(i=>i.number.toLowerCase().includes(q) || custName(i.customerId).toLowerCase().includes(q));
  const quotes = DATA.quotations.filter(i=>i.number.toLowerCase().includes(q) || custName(i.customerId).toLowerCase().includes(q));
  const prods = DATA.products.filter(p=>(p.name+' '+(p.sku||'')).toLowerCase().includes(q));
  const section = (title,rows,render) => rows.length ? `<div class="section-title">${title}</div><div class="tablewrap">${render(rows)}</div>` : '';
  return `<div class="pagehead"><div><h1>Search results for "${esc(q)}"</h1></div></div>
  ${section('Customers', custs, r=>`<table><tbody>${r.map(c=>`<tr><td>${esc(c.name)}</td><td>${esc(c.mobile)}</td><td>${esc(c.email||'')}</td></tr>`).join('')}</tbody></table>`)}
  ${section('Invoices', invs, r=>`<table><tbody>${r.map(i=>`<tr><td class="mono">${i.number}</td><td>${esc(custName(i.customerId))}</td><td>${fmtMoney(docTotals(i.items,i.discount).grand)}</td><td><button class="btn btn-ghost btn-sm" data-open-modal="invoices:${i.id}">Open</button></td></tr>`).join('')}</tbody></table>`)}
  ${section('Quotations', quotes, r=>`<table><tbody>${r.map(i=>`<tr><td class="mono">${i.number}</td><td>${esc(custName(i.customerId))}</td><td>${fmtMoney(docTotals(i.items,i.discount).grand)}</td><td><button class="btn btn-ghost btn-sm" data-open-modal="quotations:${i.id}">Open</button></td></tr>`).join('')}</tbody></table>`)}
  ${section('Products', prods, r=>`<table><tbody>${r.map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(p.sku||'')}</td><td>${fmtMoney(p.salePrice)}</td></tr>`).join('')}</tbody></table>`)}
  ${!custs.length && !invs.length && !quotes.length && !prods.length ? `<div class="empty"><div class="big">🔍</div>No matches found.</div>` : ''}`;
}

/* =========================================================
   MODAL DISPATCH
   ========================================================= */
function renderModal(){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.id = 'modalOverlay';
  const [kind, id] = STATE.modal.split(':').length>2 ? [STATE.modal.split(':')[0], STATE.modal.split(':').slice(1).join(':')] : STATE.modal.split(':');
  let html = '';
  if(CRUD[kind]) html = crudModalHtml(kind,id);
  else if(kind==='stockmove') html = stockModalHtml();
  else if(kind==='quotations'||kind==='invoices') html = docModalHtml(kind,id);
  else if(kind==='genericdoc') html = genericDocModalHtml();
  else if(kind==='users') html = usersModalHtml();
  overlay.innerHTML = html;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e=>{ if(e.target===overlay){ STATE.modal=null; overlay.remove(); } });
  overlay.querySelectorAll('[data-close-modal]').forEach(b=>b.addEventListener('click',()=>{STATE.modal=null; overlay.remove();}));
  const saveCrudBtn = overlay.querySelector('[data-save-crud]');
  if(saveCrudBtn) saveCrudBtn.addEventListener('click', ()=>{ const [k,i] = saveCrudBtn.dataset.saveCrud.split(':'); saveCrud(k, saveCrudBtn.dataset.saveCrud.split(':').slice(1).join(':')||i); });
  const saveStockBtn = overlay.querySelector('[data-save-stock]');
  if(saveStockBtn) saveStockBtn.addEventListener('click', saveStock);
  const saveDocBtn = overlay.querySelector('[data-save-doc]');
  if(saveDocBtn) saveDocBtn.addEventListener('click', ()=>{ const parts = saveDocBtn.dataset.saveDoc.split(':'); saveDoc(parts[0], parts.slice(1).join(':')); });
  const saveGenericBtn = overlay.querySelector('[data-save-generic]');
  if(saveGenericBtn) saveGenericBtn.addEventListener('click', saveGenericDoc);
  const saveUserBtn = overlay.querySelector('[data-save-user]');
  if(saveUserBtn) saveUserBtn.addEventListener('click', saveUser);
  const addItemBtn = overlay.querySelector('#addItemRow');
  if(addItemBtn) addItemBtn.addEventListener('click', ()=>{
    document.getElementById('itemRows').insertAdjacentHTML('beforeend', itemRowHtml({productId:'',name:'',qty:1,rate:0,gst:DATA.settings.gstDefault||18}, document.querySelectorAll('#itemRows tr').length));
    bindItemRowEvents();
  });
  if(kind==='quotations'||kind==='invoices'){ bindItemRowEvents(); const di=document.getElementById('discInput'); if(di) di.addEventListener('input', refreshDocTotals); }
  if(kind==='genericdoc'){
    const typeSel = overlay.querySelector('#docTypeSel');
    typeSel?.addEventListener('change', ()=>{
      const partySel = overlay.querySelector('#partySel');
      if(typeSel.value==='Purchase Order'){ partySel.innerHTML = DATA.suppliers.map(s=>`<option value="${s.id}" data-type="supplier">${esc(s.name)}</option>`).join(''); }
      else { partySel.innerHTML = DATA.customers.map(c=>`<option value="${c.id}" data-type="customer">${esc(c.name)}</option>`).join(''); }
    });
  }
  if(kind==='settings'){}
  if(kind==='products'){
    const gstChk = overlay.querySelector('[data-field="gstApplicable"]');
    const gstRateField = overlay.querySelector('[data-field="gstRate"]')?.closest('.field');
    const syncGstRateField = ()=>{ if(!gstRateField) return; gstRateField.style.display = gstChk.checked ? '' : 'none'; };
    if(gstChk){ syncGstRateField(); gstChk.addEventListener('change', syncGstRateField); }
  }
}
function bindItemRowEvents(){
  document.querySelectorAll('#itemRows [data-item]').forEach(el=>{
    el.addEventListener('change', (e)=>{
      if(e.target.dataset.item==='productId'){
        const tr = e.target.closest('tr');
        const prod = prodById(e.target.value);
        if(prod){
          tr.querySelector('[data-item="rate"]').value = prod.salePrice||0;
          tr.querySelector('[data-item="gst"]').value = prod.gstApplicable===false ? 0 : (prod.gstRate ?? (DATA.settings.gstDefault||18));
        }
      }
      refreshDocTotals(); bindItemRowEvents();
    });
  });
  document.querySelectorAll('[data-rmrow]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const rows = [...document.querySelectorAll('#itemRows tr')];
      rows[Number(b.dataset.rmrow)].remove();
      refreshDocTotals(); bindItemRowEvents();
    });
  });
}

/* =========================================================
   GLOBAL EVENT BINDING
   ========================================================= */
function bindGlobal(){
  document.querySelectorAll('.navitem').forEach(el=>el.addEventListener('click', ()=>{
    STATE.tab = el.dataset.tab; STATE.search=''; STATE.moduleSearch=''; STATE.mobileNavOpen=false; render();
  }));
  const gs = document.getElementById('gsInput');
  if(gs) gs.addEventListener('input', e=>{ STATE.search = e.target.value; render(); document.getElementById('gsInput').focus(); document.getElementById('gsInput').selectionStart = document.getElementById('gsInput').value.length; });
  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.addEventListener('click', ()=>{ auth.signOut(); });
  const qq = document.getElementById('quickQuoteBtn');
  if(qq) qq.addEventListener('click', ()=>{ STATE.modal='quotations:new'; render(); });
  const menuToggle = document.getElementById('menuToggle');
  if(menuToggle) menuToggle.addEventListener('click', ()=>{ STATE.mobileNavOpen = !STATE.mobileNavOpen; render(); });
  const sidebarOverlay = document.getElementById('sidebarOverlay');
  if(sidebarOverlay) sidebarOverlay.addEventListener('click', ()=>{ STATE.mobileNavOpen = false; render(); });
}
function bindTab(){
  document.querySelectorAll('[data-open-modal]').forEach(el=>el.addEventListener('click', ()=>{ STATE.modal = el.dataset.openModal; render(); }));
  document.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click', ()=>{ const [k,i]=el.dataset.del.split(':'); deleteRecord(k, el.dataset.del.split(':').slice(1).join(':')||i); }));
  document.querySelectorAll('[data-print]').forEach(el=>el.addEventListener('click', ()=>{ const [k,i,f]=el.dataset.print.split(':'); printDoc(k,i,f); }));
  document.querySelectorAll('[data-printgeneric]').forEach(el=>el.addEventListener('click', ()=>{ const [i,f]=el.dataset.printgeneric.split(':'); printGeneric(i,f); }));
  document.querySelectorAll('[data-convert]').forEach(el=>el.addEventListener('click', ()=>convertQuoteToInvoice(el.dataset.convert)));
  document.querySelectorAll('[data-convert-lead]').forEach(el=>el.addEventListener('click', ()=>convertLeadToCustomer(el.dataset.convertLead)));
  document.querySelectorAll('[data-markpaid]').forEach(el=>el.addEventListener('click', ()=>markInvoicePaid(el.dataset.markpaid)));
  document.querySelectorAll('[data-wa]').forEach(el=>el.addEventListener('click', ()=>{ const [k,i]=el.dataset.wa.split(':'); waLink(k,i); }));
  document.querySelectorAll('[data-remind-wa]').forEach(el=>el.addEventListener('click', ()=>{
    const [mobile,type,party,ref] = el.dataset.remindWa.split('|');
    const msg = `Hello ${party}, this is a reminder regarding your ${type} (${ref}) from ${DATA.settings.companyName}. Please get in touch with us for renewal / payment.`;
    window.open(`https://wa.me/${mobile.replace(/[^0-9]/g,'')}?text=${encodeURIComponent(msg)}`,'_blank');
  }));
  const productExportBtn = document.getElementById('productExportBtn');
  if(productExportBtn) productExportBtn.addEventListener('click', exportProductsCSV);
  const productImportBtn = document.getElementById('productImportBtn');
  const productImportInput = document.getElementById('productImportInput');
  if(productImportBtn && productImportInput){
    productImportBtn.addEventListener('click', ()=> productImportInput.click());
    productImportInput.addEventListener('change', e=>{
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{ importProductsCSV(String(reader.result)); productImportInput.value=''; };
      reader.readAsText(file);
    });
  }
  const downloadBackupBtn = document.getElementById('downloadBackupBtn');
  if(downloadBackupBtn) downloadBackupBtn.addEventListener('click', downloadBackup);
  const restoreBackupBtn = document.getElementById('restoreBackupBtn');
  const restoreBackupInput = document.getElementById('restoreBackupInput');
  if(restoreBackupBtn && restoreBackupInput){
    restoreBackupBtn.addEventListener('click', ()=> restoreBackupInput.click());
    restoreBackupInput.addEventListener('change', e=>{
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{ restoreBackup(String(reader.result)); restoreBackupInput.value=''; };
      reader.readAsText(file);
    });
  }
  const msi = document.getElementById('moduleSearchInput');
  if(msi) msi.addEventListener('input', e=>{ STATE.moduleSearch = e.target.value; render(); const i=document.getElementById('moduleSearchInput'); i.focus(); i.selectionStart=i.value.length; });
  const saveSettingsBtn = document.getElementById('saveSettingsBtn');
  if(saveSettingsBtn) saveSettingsBtn.addEventListener('click', async ()=>{
    DATA.settings.companyName = document.getElementById('setName').value;
    DATA.settings.companyAddress = document.getElementById('setAddr').value;
    DATA.settings.companyPhone = document.getElementById('setPhone').value;
    DATA.settings.companyGST = document.getElementById('setGst').value;
    DATA.settings.gstDefault = Number(document.getElementById('setGstRate').value)||18;
    DATA.settings.bankName = document.getElementById('setBankName').value;
    DATA.settings.bankAccountName = document.getElementById('setBankAccName').value;
    DATA.settings.bankAccountNo = document.getElementById('setBankAcc').value;
    DATA.settings.bankIFSC = document.getElementById('setBankIfsc').value;
    DATA.settings.bankBranch = document.getElementById('setBankBranch').value;
    DATA.settings.upiId = document.getElementById('setUpi').value;
    await save('settings'); toast('✓ Settings saved');
  });
  const logoInput = document.getElementById('setLogo');
  if(logoInput) logoInput.addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = async ()=>{ DATA.settings.logoDataUrl = reader.result; await save('settings'); toast('✓ Logo uploaded'); render(); };
    reader.readAsDataURL(file);
  });
  const clearLogo = document.getElementById('clearLogo');
  if(clearLogo) clearLogo.addEventListener('click', async e=>{ e.preventDefault(); DATA.settings.logoDataUrl=''; await save('settings'); render(); });
  const bankQrInput = document.getElementById('setBankQr');
  if(bankQrInput) bankQrInput.addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = async ()=>{ DATA.settings.bankQrDataUrl = reader.result; await save('settings'); toast('✓ QR uploaded'); render(); };
    reader.readAsDataURL(file);
  });
  const clearBankQr = document.getElementById('clearBankQr');
  if(clearBankQr) clearBankQr.addEventListener('click', async e=>{ e.preventDefault(); DATA.settings.bankQrDataUrl=''; await save('settings'); render(); });
}

/* =========================================================
   AUTH + BOOT
   ========================================================= */
function showLogin(errorMsg){
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  const err = document.getElementById('loginError');
  if(errorMsg){ err.textContent = errorMsg; err.classList.add('show'); }
  else { err.textContent=''; err.classList.remove('show'); }
}

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginUserId').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('loginPassword').focus(); });
document.getElementById('loginPassword').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
function doLogin(){
  const userId = document.getElementById('loginUserId').value.trim();
  const password = document.getElementById('loginPassword').value;
  if(!userId || !password){ showLogin('Enter both User ID and Password.'); return; }
  const email = loginEmailForUserId(userId);
  auth.signInWithEmailAndPassword(email, password).catch(e => showLogin(e.message));
}

async function startApp(firebaseUser){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = '';

  await loadAll();

  const authEmail = (firebaseUser.email || '').toLowerCase();
  const userId = userIdFromLoginEmail(authEmail);
  let profile = DATA.users.find(u => normalizeUserId(u.userId||u.email) === userId);

  if(!profile && DATA.users.length === 0){
    // First person to ever sign in becomes Admin automatically
    profile = {id:uid(), name: firebaseUser.displayName || userId, userId, role:'Admin'};
    DATA.users.push(profile);
    await save('users');
  }

  STATE.authEmail = authEmail;
  STATE.currentUser = profile ? profile.name : userId;
  STATE.currentRole = profile ? profile.role : 'Read Only';
  if(!profile){
    toast('⚠ No user record found for this User ID — ask an Admin to add you in Users & Log');
  }

  if(!DATA.customers.length){
    // seed a couple of demo records so the UI isn't empty on first run
    const c1 = {id:uid(), name:'Karthik Traders', mobile:'9876543210', email:'', gst:'', address:'Chennai', createdAt:new Date().toISOString()};
    DATA.customers.push(c1); await save('customers');
    const cat1 = {id:uid(), name:'Software'}; DATA.categories.push(cat1); await save('categories');
    const p1 = {id:uid(), name:'Antivirus License (1yr)', sku:'AV-001', categoryId:cat1.id, purchasePrice:400, salePrice:999, gstRate:18, stock:25, lowStockThreshold:5, warrantyMonths:12};
    DATA.products.push(p1); await save('products');
  }
  render();
}

auth.onAuthStateChanged(user => {
  if(user) startApp(user);
  else showLogin();
});
</script>
